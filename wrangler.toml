# Must match the live Cloudflare Worker name. The deployed site is served by
# "arboretium" (https://arboretium.tikutakuminni.workers.dev). A previous typo
# ("arboritium") created a stray second worker; all wrangler commands — including
# `wrangler secret put` — must target this name to hit the live worker.
name = "arboretium"
main = "worker/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# One Worker serves the built SPA (./dist) AND the API on a single origin.
# `/api/*` runs the Worker (which strips the prefix and hands it to Hono);
# everything else is served from static assets with SPA fallback to index.html.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# --- Bindings ---
# For local `wrangler dev` the IDs below are ignored (D1/R2/KV are simulated
# locally). For deployment you MUST replace the D1 database_id and the KV id
# with the real IDs you create, and create an R2 bucket with the name below.
# See claudedocs/deploy-checklist.md.

[[d1_databases]]
binding = "DB"
database_name = "arboritium"
database_id = "e31476d5-c01e-4675-81b3-b3db5324971b"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "arboritium-photos" # create this R2 bucket

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "403b184269b742858a14bfc6cd1e20ba"

# Non-secret config. ALLOWED_ORIGIN only matters for cross-origin callers (the
# Vite dev proxy); in production the SPA and API share one origin, which the
# origin check always allows. Secrets (SITE_PASSWORD, JWT_SECRET, MML_API_KEY)
# are set with `wrangler secret put`, never here.
[vars]
ALLOWED_ORIGIN = "http://127.0.0.1:5173"
# Cost guardrail: the Worker refuses photo uploads once total stored bytes would
# cross this, so R2 never exceeds the 10 GB free tier. Lower it to be stricter.
MAX_PHOTO_BYTES = "9000000000" # ~9 GB

[dev]
ip = "127.0.0.1"
port = 8787
